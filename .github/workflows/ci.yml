name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      
    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest

    - name: Build Docker image
      run: docker build -t my-pipeline .

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push to Docker Hub
      run: |
        docker tag my-pipeline ${{ secrets.DOCKER_USERNAME }}/my-pipeline:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/my-pipeline:latest\

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.EC2_HOST_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY}}
        script: |
          docker pull palecanary/my-pipeline:latest
          docker stop my-pipeline || true
          docker rm my-pipeline || true
          docker run -d -p 3000:3000 --name my-pipeline palecanary/my-pipeline:latest